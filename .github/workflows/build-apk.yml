name: Build AZOD APK

on:
  push:
    paths:
      - 'android-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Build APK
        run: gradle assembleRelease
        working-directory: postgres-version/android-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AZOD-app
          path: postgres-version/android-app/app/build/outputs/apk/release/app-release.apk
